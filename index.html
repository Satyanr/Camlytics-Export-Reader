<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>📊 Dashboard Traffic Analytics</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="css/style.css">

</head>

<body>
    <div id="loadingOverlay">
        <div class="loader-box">
            <div class="spinner"></div>
            <div id="loadingText">Processing...</div>
        </div>
    </div>

    <div class="header">
        📊 Dashboard Traffic Analytics
    </div>

    <div class="container">

        <div class="upload-box">
            <label for="upload" class="upload-label">
                📁 Upload File
                <span>Click untuk upload file</span>
            </label>
            <input type="file" id="upload" accept=".xlsx, .xls, .csv">
        </div>
        <button onclick="exportPDF()">Export PDF</button>

        <!-- ===== TANGGAL ===== -->
        <div class="row">
            <div class="card col-8">
                <h3>Traffic per Tanggal</h3>
                <canvas id="chartTanggal"></canvas>
            </div>

            <div class="card col-4">
                <h3>Detail Tanggal</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Ped</th>
                            <th>Veh</th>
                            <th>Unk</th>
                        </tr>
                    </thead>
                    <tbody id="tableTanggal"></tbody>
                </table>
                <div id="paginationTanggal"></div>
            </div>
        </div>

        <!-- ===== PIE ===== -->
        <div class="row">
            <div class="card col-8">
                <h3>Distribution</h3>
                <canvas id="chartPie"></canvas>
            </div>

            <div class="card col-4">
                <h3>Summary</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="tableSummary"></tbody>
                </table>
            </div>
        </div>

        <!-- ===== JAM ===== -->
        <div class="row">
            <div class="card col-8">
                <h3>Traffic per Jam</h3>
                <canvas id="chartJam"></canvas>
            </div>

            <div class="card col-4">
                <h3>Detail Jam</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Jam</th>
                            <th>Ped</th>
                            <th>Veh</th>
                            <th>Unk</th>
                        </tr>
                    </thead>
                    <tbody id="tableJam"></tbody>
                </table>
                <div id="paginationJam"></div>
            </div>
        </div>

    </div>

    <script src="js/app.js"></script>
    <footer class="footer">
        <div class="footer-content">

            <div class="footer-left">
                © 2026 <b>SECURE</b> — Traffic Analytics Dashboard
            </div>

            <div class="footer-right">

                <!-- GITHUB -->

</body>

</html>
