<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>📊 Dashboard Traffic Analytics</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            background: #f4f6fb;
        }

        /* ===== HEADER ===== */
        .header {
            background: linear-gradient(135deg, #4e73df, #224abe);
            color: white;
            padding: 20px 30px;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        /* ===== CONTAINER ===== */
        .container {
            padding: 20px 30px;
        }

        /* ===== CARD ===== */
        .card {
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        /* ===== FLEX GRID ===== */
        .row {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .col-8 {
            flex: 2;
        }

        .col-4 {
            flex: 1;
        }

        /* ===== TITLE ===== */
        .card h3 {
            margin-top: 0;
            font-size: 16px;
            margin-bottom: 15px;
        }

        /* ===== TABLE ===== */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            border-radius: 10px;
            overflow: hidden;
        }

        /* HEADER */
        table thead {
            background: #4e73df;
            color: white;
        }

        table th {
            padding: 10px;
            text-align: left;
        }

        /* BODY */
        table td {
            padding: 8px;
            border-bottom: 1px solid #eee;
        }

        /* ZEBRA */
        table tr:nth-child(even) {
            background: #fafafa;
        }

        /* HOVER */
        table tr:hover {
            background: #eef3ff;
        }

        /* SUMMARY */
        #tableSummary tr:last-child {
            background: #dce3ff;
            font-weight: bold;
        }

        /* ===== BUTTON ===== */
        button {
            background: linear-gradient(135deg, #4e73df, #224abe);
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        button:hover {
            opacity: 0.9;
        }

        /* PAGINATION */
        #paginationTanggal button,
        #paginationJam button {
            margin: 2px;
            padding: 5px 9px;
            font-size: 12px;
        }

        /* ACTIVE PAGE */
        button[style*="font-weight:bold"] {
            background: #1cc88a !important;
        }

        /* ===== INPUT FILE ===== */
        input[type="file"] {
            padding: 6px;
            background: white;
            border-radius: 6px;
            border: 1px solid #ddd;
            margin-right: 10px;
        }

        /* ===== RESPONSIVE ===== */
        @media(max-width: 900px) {
            .row {
                flex-direction: column;
            }
        }

        /* ===== UPLOAD BOX ===== */
        .upload-box {
            margin-bottom: 15px;
        }

        /* HIDE DEFAULT INPUT */
        .upload-box input[type="file"] {
            display: none;
        }

        /* CUSTOM LABEL */
        .upload-label {
            display: block;
            padding: 14px;
            border: 2px dashed #cfd8ff;
            border-radius: 10px;
            text-align: center;
            background: #fafbff;
            color: #4e73df;
            font-weight: 500;
            cursor: pointer;
            transition: 0.25s;
        }

        /* SUBTEXT */
        .upload-label span {
            display: block;
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }

        /* HOVER EFFECT */
        .upload-label:hover {
            background: #eef2ff;
            border-color: #4e73df;
        }

        /* ACTIVE (SAAT FILE DIPILIH) */
        .upload-label.active {
            background: #e6ecff;
            border-color: #1cc88a;
            color: #1cc88a;
        }

        /* ===== FOOTER ===== */
        .footer {
            margin-top: 40px;
            padding: 15px 30px;
            background: #3393ed;
            border-top: 1px solid #eaeaea;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #ffffff;
        }

        /* LEFT TEXT */
        .footer-left b {
            color: #ffb405;
        }

        /* RIGHT LINK */
        .footer-right a {
            margin-left: 15px;
            text-decoration: none;
            color: #ffffff;
            transition: 0.2s;
        }

        /* HOVER */
        .footer-right a:hover {
            color: #4e73df;
        }

        /* RESPONSIVE */
        @media(max-width: 600px) {
            .footer-content {
                flex-direction: column;
                gap: 8px;
                text-align: center;
            }

            .footer-right a {
                margin: 0 8px;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        📊 Dashboard Traffic Analytics
    </div>

    <div class="container">

        <div class="upload-box">
            <label for="upload" class="upload-label">
                📁 Upload File
                <span>Click untuk upload file</span>
            </label>
            <input type="file" id="upload" accept=".xlsx, .xls, .csv">
        </div>

        <!-- ===== TANGGAL ===== -->
        <div class="row">
            <div class="card col-8">
                <h3>Traffic per Tanggal</h3>
                <canvas id="chartTanggal"></canvas>
            </div>

            <div class="card col-4">
                <h3>Detail Tanggal</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Tanggal</th>
                            <th>Ped</th>
                            <th>Veh</th>
                            <th>Unk</th>
                        </tr>
                    </thead>
                    <tbody id="tableTanggal"></tbody>
                </table>
                <div id="paginationTanggal"></div>
            </div>
        </div>

        <!-- ===== PIE ===== -->
        <div class="row">
            <div class="card col-8">
                <h3>Distribution</h3>
                <canvas id="chartPie"></canvas>
            </div>

            <div class="card col-4">
                <h3>Summary</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="tableSummary"></tbody>
                </table>
            </div>
        </div>

        <!-- ===== JAM ===== -->
        <div class="row">
            <div class="card col-8">
                <h3>Traffic per Jam</h3>
                <canvas id="chartJam"></canvas>
            </div>

            <div class="card col-4">
                <h3>Detail Jam</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Jam</th>
                            <th>Ped</th>
                            <th>Veh</th>
                            <th>Unk</th>
                        </tr>
                    </thead>
                    <tbody id="tableJam"></tbody>
                </table>
                <div id="paginationJam"></div>
            </div>
        </div>

    </div>

    <script>
        let chart1, chart2, chart3;

        document.getElementById('upload').addEventListener('change', handleFile);
        document.getElementById('upload').addEventListener('change', function(e) {
            const label = document.querySelector('.upload-label');

            if (e.target.files.length > 0) {
                label.classList.add('active');
                label.innerHTML = `✅ ${e.target.files[0].name}`;
            }
        });

        function handleFile(e) {
            const file = e.target.files[0];
            const reader = new FileReader();

            reader.onload = function(evt) {
                const data = new Uint8Array(evt.target.result);


                const workbook = XLSX.read(data, {
                    type: 'array'
                });

                const sheet = workbook.Sheets[workbook.SheetNames[0]];


                const json = XLSX.utils.sheet_to_json(sheet, {
                    defval: ""
                });

                console.log("DATA:", json);

                processData(json);
            };

            reader.readAsArrayBuffer(file);
        }

        function normalize(str) {
            return str
                .toString()
                .toLowerCase()
                .trim()
                .replace(/\r/g, "")
                .replace(/\n/g, "")
                .replace(/\s+/g, " ");
        }

        function processData(data) {

            let perTanggal = {};
            let perJam = {};
            let total = {
                pedestrian: 0,
                vehicle: 0,
                unknown: 0
            };

            data.forEach(row => {

                // 🔥 auto detect header (aman walau beda nama)
                let rawTime = row.Time || row.time || row["Time "] || "";
                let origin = row.Origin || row.origin || "";

                if (!rawTime || !origin) return;

                origin = normalize(origin);

                let tanggal = "";
                let jam = "";

                try {
                    if (typeof rawTime === "number") {
                        let d = XLSX.SSF.parse_date_code(rawTime);

                        tanggal = `${String(d.d).padStart(2,'0')}/${String(d.m).padStart(2,'0')}/${d.y}`;
                        jam = String(d.H).padStart(2, '0') + ":00";
                    } else {
                        rawTime = rawTime.toString().trim();

                        let parts = rawTime.split(" ");
                        if (parts.length < 2) return;

                        tanggal = parts[0];
                        jam = parts[1].substring(0, 2) + ":00";
                    }
                } catch (e) {
                    console.log("ERROR TIME:", rawTime);
                    return;
                }

                // INIT
                if (!perTanggal[tanggal]) {
                    perTanggal[tanggal] = {
                        pedestrian: 0,
                        vehicle: 0,
                        unknown: 0
                    };
                }

                if (!perJam[jam]) {
                    perJam[jam] = {
                        pedestrian: 0,
                        vehicle: 0,
                        unknown: 0
                    };
                }

                // 🔥 DETEKSI FIX
                if (origin.includes("pedestrian")) {
                    perTanggal[tanggal].pedestrian++;
                    perJam[jam].pedestrian++;
                    total.pedestrian++;
                } else if (origin.includes("vehicle")) {
                    perTanggal[tanggal].vehicle++;
                    perJam[jam].vehicle++;
                    total.vehicle++;
                } else {
                    perTanggal[tanggal].unknown++;
                    perJam[jam].unknown++;
                    total.unknown++;
                }
            });

            console.log("HASIL:", perTanggal, perJam, total);

            if (Object.keys(perTanggal).length === 0) {
                alert("Data tidak terbaca! Cek kolom Time & Origin");
                return;
            }

            renderCharts(perTanggal, perJam, total);
            renderTables(perTanggal, perJam, total);
        }

        function renderCharts(tanggalData, jamData, total) {

            if (chart1) chart1.destroy();
            if (chart2) chart2.destroy();
            if (chart3) chart3.destroy();

            const tgl = Object.keys(tanggalData).sort((a, b) => {
                return new Date(a.split('/').reverse().join('-')) -
                    new Date(b.split('/').reverse().join('-'));
            });

            const jam = Object.keys(jamData).sort();

            // ===== TANGGAL =====
            chart1 = new Chart(document.getElementById('chartTanggal'), {
                type: 'bar',
                data: {
                    labels: tgl,
                    datasets: [{
                            label: 'Pedestrian',
                            data: tgl.map(d => tanggalData[d].pedestrian)
                        },
                        {
                            label: 'Vehicle',
                            data: tgl.map(d => tanggalData[d].vehicle)
                        },
                        {
                            label: 'Unknown',
                            data: tgl.map(d => tanggalData[d].unknown)
                        }
                    ]
                }
            });

            // ===== PIE =====
            chart2 = new Chart(document.getElementById('chartPie'), {
                type: 'pie',
                data: {
                    labels: ['Pedestrian', 'Vehicle', 'Unknown'],
                    datasets: [{
                        data: [total.pedestrian, total.vehicle, total.unknown]
                    }]
                }
            });

            // ===== JAM =====
            chart3 = new Chart(document.getElementById('chartJam'), {
                type: 'bar',
                data: {
                    labels: jam,
                    datasets: [{
                            label: 'Pedestrian',
                            data: jam.map(j => jamData[j].pedestrian)
                        },
                        {
                            label: 'Vehicle',
                            data: jam.map(j => jamData[j].vehicle)
                        },
                        {
                            label: 'Unknown',
                            data: jam.map(j => jamData[j].unknown)
                        }
                    ]
                }
            });
        }

        function renderTables(tanggalData, jamData, total) {

            const tglKeys = Object.keys(tanggalData);
            const jamKeys = Object.keys(jamData).sort();

            // ===== TABLE TANGGAL =====
            let tglHTML = "";
            Object.keys(tanggalData).forEach(tgl => {
                let d = tanggalData[tgl];
                tglHTML += `
            <tr>
                <td>${tgl}</td>
                <td>${d.pedestrian.toLocaleString()}</td>
                <td>${d.vehicle.toLocaleString()}</td>
                <td>${d.unknown.toLocaleString()}</td>
            </tr>
        `;
            });
            document.getElementById("tableTanggal").innerHTML = tglHTML;

            // ===== TABLE JAM =====
            let jamHTML = "";
            Object.keys(jamData).sort().forEach(j => {
                let d = jamData[j];
                jamHTML += `
            <tr>
                <td>${j}</td>
                <td>${d.pedestrian.toLocaleString()}</td>
                <td>${d.vehicle.toLocaleString()}</td>
                <td>${d.unknown.toLocaleString()}</td>
            </tr>
        `;
            });
            document.getElementById("tableJam").innerHTML = jamHTML;

            // ===== PAGINATION TANGGAL =====
            paginate(tglKeys, tanggalData, "tableTanggal", "paginationTanggal");

            // ===== PAGINATION JAM =====
            paginate(jamKeys, jamData, "tableJam", "paginationJam");

            // ===== TABLE SUMMARY =====
            const grandTotal = total.pedestrian + total.vehicle + total.unknown;

            document.getElementById("tableSummary").innerHTML = `
        <tr><td>Pedestrian</td><td>${total.pedestrian.toLocaleString()}</td></tr>
        <tr><td>Vehicle</td><td>${total.vehicle.toLocaleString()}</td></tr>
        <tr><td>Unknown</td><td>${total.unknown.toLocaleString()}</td></tr>
        <tr style="font-weight:bold; background:#eee;">
            <td>Grand Total</td>
            <td>${grandTotal.toLocaleString()}</td>
        </tr>
    `;
        }

        function paginate(dataKeys, dataObj, tableId, paginationId, rowsPerPage = 10) {
            let currentPage = 1;

            function renderPage(page) {
                currentPage = page;

                const start = (page - 1) * rowsPerPage;
                const end = start + rowsPerPage;

                const pageData = dataKeys.slice(start, end);

                let html = "";

                pageData.forEach(key => {
                    const d = dataObj[key];
                    html += `
                <tr>
                    <td>${key}</td>
                    <td>${d.pedestrian.toLocaleString()}</td>
                    <td>${d.vehicle.toLocaleString()}</td>
                    <td>${d.unknown.toLocaleString()}</td>
                </tr>
            `;
                });

                document.getElementById(tableId).innerHTML = html;

                renderPagination();
            }

            function renderPagination() {
                const totalPages = Math.ceil(dataKeys.length / rowsPerPage);

                let buttons = "";

                for (let i = 1; i <= totalPages; i++) {
                    buttons += `
                <button onclick="goPage('${tableId}', ${i})"
                    style="margin:2px; ${i === currentPage ? 'font-weight:bold;' : ''}">
                    ${i}
                </button>
            `;
                }

                document.getElementById(paginationId).innerHTML = buttons;
            }

            window.goPage = function(table, page) {
                if (table === tableId) {
                    renderPage(page);
                }
            }

            renderPage(1);
        }
    </script>
